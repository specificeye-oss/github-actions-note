import { chromium } from 'playwright';
import fs from 'fs';

const article = JSON.parse(fs.readFileSync('article.json', 'utf-8'));

(async () => {
  const browser = await chromium.launch({ headless: true });
  const context = await browser.newContext({
    storageState: 'auth.json'
  });
  const page = await context.newPage();

  try {
    // note.comの記事作成ページに移動
    await page.goto('https://note.com/new', { 
      waitUntil: 'networkidle',
      timeout: 60000 
    });
    
    // UIの完全レンダリングを待つ
    await page.waitForTimeout(3000);

    // タイトル入力欄を複数の方法で探す
    const titleSelectors = [
      'input[placeholder*="タイトル"]',
      'textarea[placeholder*="タイトル"]',
      '[data-testid="title-input"]',
      'div[contenteditable="true"]:first-of-type',
      '[placeholder="記事タイトル"]',
      '[data-placeholder="記事タイトル"]'
    ];

    let titleInput = null;
    for (const selector of titleSelectors) {
      try {
        console.log(`Trying selector: ${selector}`);
        titleInput = await page.waitForSelector(selector, { timeout: 5000 });
        if (titleInput) {
          console.log(`Found title input with: ${selector}`);
          break;
        }
      } catch (e) {
        console.log(`Selector ${selector} not found, trying next...`);
        continue;
      }
    }

    if (!titleInput) {
      throw new Error('Title field not found after trying all selectors');
    }

    // タイトル入力
    await titleInput.click();
    await titleInput.fill(article.title);
    console.log('Title entered successfully');

    // 本文入力欄を探す
    const bodySelectors = [
      'div[contenteditable="true"].note-common-editor',
      '[data-testid="body-editor"]',
      'div[contenteditable="true"]:not(:first-of-type)',
      '.note-editor-body'
    ];

    let bodyInput = null;
    for (const selector of bodySelectors) {
      try {
        console.log(`Trying body selector: ${selector}`);
        bodyInput = await page.waitForSelector(selector, { timeout: 5000 });
        if (bodyInput) {
          console.log(`Found body input with: ${selector}`);
          break;
        }
      } catch (e) {
        console.log(`Body selector ${selector} not found, trying next...`);
        continue;
      }
    }

    if (!bodyInput) {
      throw new Error('Body field not found');
    }

    // 本文入力
    await bodyInput.click();
    await bodyInput.fill(article.body);
    console.log('Body entered successfully');

    // スクリーンショット保存（デバッグ用）
    await page.screenshot({ path: 'debug-before-save.png' });

    // 下書き保存ボタンを探す
    await page.waitForTimeout(1000);
    const saveButton = await page.waitForSelector('button:has-text("下書き保存"), button:has-text("保存")');
    await saveButton.click();
    console.log('Draft saved successfully');

    await page.waitForTimeout(2000);
    await page.screenshot({ path: 'debug-after-save.png' });

  } catch (error) {
    console.error('Error:', error);
    await page.screenshot({ path: 'error-screenshot.png' });
    throw error;
  } finally {
    await browser.close();
  }
})();
