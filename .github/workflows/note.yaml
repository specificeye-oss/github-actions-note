name: Note Workflow

on:
  workflow_dispatch:
    inputs:
      theme:
        description: 記事テーマ
        required: true
        type: string
      target:
        description: 想定読者
        required: true
        type: string
      message:
        description: 核メッセージ
        required: true
        type: string
      cta:
        description: CTA
        required: true
        type: string
      is_public:
        description: 公開(true)/下書き(false)
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:

  research:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          echo '{"research":"ok"}' > research.json

      - id: collect
        run: |
          echo "research_b64=$(base64 -w 0 research.json)" >> "$GITHUB_OUTPUT"



  write:
    runs-on: ubuntu-latest
    needs: research

    outputs:
      article_b64: ${{ steps.collect.outputs.article_b64 }}

    steps:

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          cat <<EOF > article.json
          {
            "title": "note自動投稿テスト",
            "body": "これはGitHub Actionsから自動投稿されたテスト記事です。"
          }
          EOF

      - id: collect
        run: |
          echo "article_b64=$(base64 -w 0 article.json)" >> "$GITHUB_OUTPUT"



  post:
    runs-on: ubuntu-latest
    needs: write

    env:
      NOTE_STORAGE_STATE_JSON: ${{ secrets.NOTE_STORAGE_STATE_JSON }}
      ARTICLE_B64: ${{ needs.write.outputs.article_b64 }}
      IS_PUBLIC: ${{ github.event.inputs.is_public }}

    steps:

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - run: |
          cat > note-state.json <<EOF
          ${{ secrets.NOTE_STORAGE_STATE_JSON }}
          EOF

      - run: |
          cat <<'EOF' > post.mjs

          import { chromium } from "playwright";

          const data = JSON.parse(
            Buffer.from(process.env.ARTICLE_B64, "base64").toString()
          );

          const browser = await chromium.launch({
            headless: true
          });

          const context = await browser.newContext({
            storageState: "note-state.json"
          });

          const page = await context.newPage();

          await page.goto("https://note.com/new");

          await page.waitForTimeout(5000);

          const titleSelectors = [
            '[placeholder="記事タイトル"]',
            '[data-placeholder="記事タイトル"]',
            '[contenteditable="true"]',
            'textarea'
          ];

          let titleDone = false;

          for (const sel of titleSelectors) {

            const loc = page.locator(sel).first();

            if (await loc.count()) {

              try {

                await loc.click();

                await loc.fill(data.title);

                titleDone = true;

                break;

              } catch {}

            }

          }

          if (!titleDone) {

            throw new Error("title field not found");

          }

          await page.keyboard.press("Tab");

          await page.keyboard.type(data.body, {
            delay: 5
          });

          if (process.env.IS_PUBLIC === "true") {

            await page.click('button:has-text("公開")');

          } else {

            await page.click('button:has-text("下書き")');

          }

          await page.waitForTimeout(5000);

          await browser.close();

          EOF

          node post.mjs
